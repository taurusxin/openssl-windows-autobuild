name: Delete skipped OpenSSL runs

on:
  repository_dispatch:
    types:
      - delete-skipped-openssl-run

permissions:
  actions: write

jobs:
  delete-skipped-run:
    name: Delete skipped OpenSSL run
    runs-on: ubuntu-latest
    steps:
      - name: Delete run if no build jobs executed
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.event.client_payload.run_id }}
        run: |
          set -euo pipefail

          if [[ -z "${RUN_ID}" ]]; then
            echo "No workflow run id was provided."
            exit 1
          fi

          run_api="repos/${REPOSITORY}/actions/runs/${RUN_ID}"
          status=""

          for attempt in {1..40}; do
            status="$(gh api "${run_api}" --jq '.status')"
            if [[ "${status}" == "completed" ]]; then
              break
            fi

            echo "Workflow run ${RUN_ID} is ${status}; waiting for completion."
            sleep 15
          done

          if [[ "${status}" != "completed" ]]; then
            echo "Workflow run ${RUN_ID} did not complete before cleanup timed out."
            exit 1
          fi

          event="$(gh api "${run_api}" --jq '.event')"
          conclusion="$(gh api "${run_api}" --jq '.conclusion')"
          path="$(gh api "${run_api}" --jq '.path')"

          if [[ "${event}" != "schedule" || "${conclusion}" != "success" || "${path}" != ".github/workflows/build-openssl-windows.yml" ]]; then
            echo "Workflow run ${RUN_ID} is not an eligible skipped scheduled build."
            echo "event=${event} conclusion=${conclusion} path=${path}"
            exit 0
          fi

          build_job_count="$(
            gh api "${run_api}/jobs?per_page=100" \
              --jq '[.jobs[] | select(.name | startswith("OpenSSL ")) | select(.conclusion == "success")] | length'
          )"

          if [[ "${build_job_count}" != "0" ]]; then
            echo "Workflow run ${RUN_ID} executed ${build_job_count} build job(s); keeping it."
            exit 0
          fi

          echo "Deleting skipped scheduled workflow run ${RUN_ID}."
          gh api --method DELETE "${run_api}"
